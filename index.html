<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RMStore | Gerador de Link</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #1c1c1c;
  padding: 40px 25px;
  border-radius: 12px;
  width: 95%;
  max-width: 420px;
  text-align: center;
  box-shadow: 0 0 20px rgba(255, 102, 0, 0.3);
}

.logo {
  font-size: 26px;
  font-weight: bold;
  color: #ff6600;
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-bottom: 15px;
}

button {
  width: 100%;
  padding: 14px;
  background: #ff6600;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  color: #fff;
  cursor: pointer;
}

button:hover {
  background: #ff8533;
}

.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #777;
}
</style>
</head>

<body>

<div class="container">
  <div class="logo">🚀 RMStore</div>
  <p>Cole o link do produto abaixo:</p>

  <input type="text" placeholder="Cole aqui o link da Shopee">

  <button onclick="redirecionar()">🔥 GERAR LINK</button>

  <div class="footer">
    Página de afiliado independente.
  </div>
</div>

<script>
function redirecionar() {
  window.location.href = "https://collshp.com/roberto.ms105?view=storefront";
}
</script>

</body>
</html>
