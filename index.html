<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RMStore | Gerador de Link Afiliado</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #1c1c1c;
  padding: 40px 25px;
  border-radius: 12px;
  width: 95%;
  max-width: 420px;
  text-align: center;
  box-shadow: 0 0 20px rgba(255, 102, 0, 0.3);
}

.logo {
  font-size: 26px;
  font-weight: bold;
  color: #ff6600;
  margin-bottom: 10px;
}

.sub {
  font-size: 14px;
  margin-bottom: 25px;
  color: #ccc;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-bottom: 15px;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 14px;
  background: #ff6600;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  color: #fff;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff8533;
}

.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #777;
}
</style>
</head>

<body>

<div class="container">
  <div class="logo">🚀 RMStore</div>
  <div class="sub">Cole o link do produto da Shopee abaixo para gerar seu acesso.</div>

  <input type="text" id="linkProduto" placeholder="Cole aqui o link do produto">

  <button onclick="gerarLink()">🔥 GERAR LINK</button>

  <div class="footer">
    Página de afiliado independente.
  </div>
</div>

<script>
function gerarLink() {

  var linkOriginal = document.getElementById("linkProduto").value;

  if(linkOriginal === "") {
    alert("Cole o link do produto primeiro.");
    return;
  }

  // ====== COLOQUE AQUI SEU LINK BASE DE AFILIADO ======
  var linkAfiliadoBase = "https://collshp.com/roberto.ms105?view=storefront";

  // Redireciona sempre para seu link afiliado
  window.location.href = linkAfiliadoBase;
}
</script>

</body>
</html>
